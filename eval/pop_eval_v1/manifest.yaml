schema_version: 1
eval_set: pop_eval_v1
eval_set_version: 1.0.0-draft
description: |
  Phase 3 paid 30-song pop eval set, per
  docs/research/transcription-improvement-implementation-plan.md §Phase 3
  and docs/research/transcription-improvement-strategy.md Part III §3.

  The eval set is split 50/50 between a tune set (engineer-readable) and
  a holdout set (encrypted in holdout_manifest.yaml.enc). Engineers
  debugging a regression must reproduce on tune set; the holdout is
  reserved for release gates only.

  Each slot is "delivered" once all four artifacts land under
  ``songs/<slug>/``:

    * ``source.audio.json`` — license metadata + content hash
    * ``source.audio.{mp3,wav}`` — IFF the license is redistributable
    * ``reference.piano_cover.mid`` — contract-transcribed ground truth
    * ``reference.piano_cover.musicxml`` — engraved reference
    * ``reference.piano_cover.pdf`` — PDF of the engraved reference
    * ``structural.yaml`` — human-verified key, time-sig, tempo,
                            sections, chord progression, downbeats
    * ``notes.md`` — transcriber notes / known difficulties

  Until a slot is delivered, ``eval/loader.py`` skips it. The first
  pop_eval_v1 baseline JSON snapshot can be taken with as few as 1
  delivered song and is expected to grow as transcribers ship.

# 0 = no clipping. Phase 3 is release-gate eval — we want full-track
# scores, not 30-second clips. CI subset uses a different config.
target_duration_sec: 0

# Default ``key_label`` prior for chord recognition when ``structural.yaml``
# does not pin one. ``auto`` defers to whatever the transcribe stage
# emits, mirroring eval/pop_mini_v0/.
chord_recognition_key: auto

# Genre buckets for ≥3-genre coverage per Phase 3 task list.
# Mapping is informational; the loader does not enforce it.
genres:
  - pop_mainstream
  - hip_hop
  - kpop
  - ballad
  - indie_electronic

# License buckets for the 10/20 split.
# - fma_redistributable: Free Music Archive cc-by* tracks; audio is
#   committed alongside the manifest.
# - commercial_sync_internal: $50 sync license, internal research use
#   only; audio is NOT committed — only ``source.audio.json`` with a
#   content hash and the license id. The release-bot fetches the audio
#   from a private bucket at eval time.
licenses:
  fma_redistributable:
    redistribute: true
    cost_per_song_usd: 0
    notes: |
      FMA ``commercial=true`` cc-by / cc-by-sa tracks. Audio shipped with
      the repo alongside ``source.audio.json``.
  commercial_sync_internal:
    redistribute: false
    cost_per_song_usd: 50
    notes: |
      Sync licenses for the 20 commercial pop tracks. Internal research
      use only; audio MUST NOT be committed. ``source.audio.json``
      records the content hash + the storage URI in the private bucket.

# Transcriber contract terms — duplicated here so the manifest is
# self-describing if someone clones the eval set without context.
transcriber_contract:
  rate_per_song_usd: 30
  total_cost_usd: 900
  deliverable_format: |
    Per-song bundle: reference.piano_cover.mid +
    reference.piano_cover.musicxml + reference.piano_cover.pdf +
    structural.yaml + notes.md. ``source.audio.json`` is provided to the
    transcriber; the audio file is fetched separately for the licensed
    tracks.
  qa_policy: |
    Spot-check 5% of deliveries by cross-checking ``structural.yaml.key``
    against ``backend/services/chord_recognition.py`` HMM estimate.
    Reject any song where the structural key disagrees with the
    estimator's top-1 by more than a perfect-fifth.

