schema_version: 1
eval_set: pop_mini_v0
description: |
  Phase 0 reference-free mini-eval set, per
  docs/research/transcription-improvement-implementation-plan.md §Phase 0.

  4 slots curated with real audio (all FMA), 1 slot undelivered. Each
  ``source`` block was produced by ``scripts/curate_pop_mini_v0.py`` and
  records its source URL, content hash, and license. The original
  ``intended_source`` blocks are retained as historical record of what
  the slot targets.

  Slot inventory:
    mini_pop_001    — Jahzzar / Two days        (CC BY-SA 3.0, FMA Pop)
    mini_pop_002    — Tours / Enthusiast        (CC BY 3.0, FMA Electronic)
    mini_pop_003    — Alaclair Ensemble /
                      Intergalactique           (CC BY-SA 3.0, FMA Soul-RnB)
    mini_kpop_001   — *undelivered* — see redistribution-policy note.
    mini_ballad_001 — Peter Rudenko / Snowing   (CC BY 3.0, FMA Classical /
                                                 solo piano)

  Redistribution policy:
    Only audio with a verifiable, redistributable license (CC-BY /
    CC-BY-SA from FMA, where the platform itself enforces a license
    schema) is committed in-repo. Earlier curation seeded
    ``mini_kpop_001`` with a YouTube clip whose license was
    uploader-asserted CC-BY; the asset has been removed pending
    a properly-licensed K-pop replacement. The slot stays in the
    manifest as ``intended_source`` only so the loader counts it as
    undelivered. To re-deliver, point ``source`` at an FMA K-pop track
    or a clip whose license is verified by the publishing platform.

  Earlier ``synthetic_from_midi`` bootstraps (FluidSynth-rendered MIDIs
  from ``eval/fixtures/clean_midi/``) are gone from the manifest but
  still drive ``scripts/eval_mini.py`` if you flip a slot back. The
  bootstrap baseline at
  ``eval/baselines/pop_mini_v0__main_5532577.json`` is preserved
  alongside the real-audio baseline at
  ``eval/baselines/pop_mini_v0__main_5532577_real.json`` so the
  bootstrap-vs-real comparison stays available.

# Each song is clipped to this many seconds before it enters the pipeline,
# so a 5-song run completes inside the Phase 0 acceptance window (<2 min).
target_duration_sec: 30.0

# Reference-free chord recognition uses HMM smoothing; the same key prior
# is used on both sides (input audio and FluidSynth re-synth of the
# engraved MIDI) so the comparison stays symmetric. ``auto`` defers to
# whatever the transcribe stage emits as ``HarmonicAnalysis.key``.
chord_recognition_key: auto

