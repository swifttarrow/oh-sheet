name: Deploy to VM

on:
  push:
    branches: [qa, main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  IMAGE: ${{ vars.GCP_REGION || 'us-central1' }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/oh-sheet/app
  IMAGE_DECOMPOSER: ${{ vars.GCP_REGION || 'us-central1' }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/oh-sheet/decomposer
  IMAGE_ASSEMBLER: ${{ vars.GCP_REGION || 'us-central1' }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/oh-sheet/assembler

jobs:
  deploy:
    name: Build & Deploy (${{ github.ref_name }})
    runs-on: ubuntu-latest
    # Route qa pushes → qa environment, main pushes → prod environment.
    # Environment-scoped vars/secrets (VM_HOST, PUBLIC_URL) determine the target.
    environment:
      name: ${{ github.ref_name == 'main' && 'prod' || 'qa' }}
      url: ${{ vars.PUBLIC_URL }}
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /usr/local/graalvm /usr/local/julia* \
            /usr/share/swift /opt/hostedtoolcache/CodeQL
          sudo docker system prune -af
          df -h /

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authorize Docker push
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep -m1 '^version' pyproject.toml | sed 's/version *= *"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and push container images
        env:
          # TUNECHAT_URL is baked into the Flutter JS bundle at build time
          # via --dart-define (see Dockerfile flutter-build stage).
          # Pulling through env: is the safe pattern — inline expressions
          # in a run: shell line is a workflow-injection smell.
          TUNECHAT_URL: ${{ vars.OHSHEET_TUNECHAT_URL }}
        run: |
          docker build \
            --build-arg APP_VERSION=${{ steps.version.outputs.version }} \
            --build-arg TUNECHAT_URL="$TUNECHAT_URL" \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

          docker build -t ${{ env.IMAGE_DECOMPOSER }}:${{ github.sha }} -t ${{ env.IMAGE_DECOMPOSER }}:latest -f svc-decomposer/Dockerfile .
          docker push ${{ env.IMAGE_DECOMPOSER }}:${{ github.sha }}
          docker push ${{ env.IMAGE_DECOMPOSER }}:latest

          docker build -t ${{ env.IMAGE_ASSEMBLER }}:${{ github.sha }} -t ${{ env.IMAGE_ASSEMBLER }}:latest -f svc-assembler/Dockerfile .
          docker push ${{ env.IMAGE_ASSEMBLER }}:${{ github.sha }}
          docker push ${{ env.IMAGE_ASSEMBLER }}:latest

      - name: Deploy to VM
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          VM_HOST: ${{ vars.VM_HOST }}
          VM_USER: ${{ vars.VM_USER }}
          # TuneChat integration — env-scoped so qa + prod each inject
          # their own config. Both currently point at prod TuneChat, but
          # that's a provisioning choice, not a pipeline one. Referenced
          # by orchestrator + worker-ingest via docker-compose.prod.yml.
          OHSHEET_TUNECHAT_ENABLED: ${{ vars.OHSHEET_TUNECHAT_ENABLED }}
          OHSHEET_TUNECHAT_URL: ${{ vars.OHSHEET_TUNECHAT_URL }}
          OHSHEET_TUNECHAT_API_KEY: ${{ secrets.OHSHEET_TUNECHAT_API_KEY }}
          # Anthropic API — used by worker-refine for LLM metadata enrichment.
          OHSHEET_ANTHROPIC_API_KEY: ${{ secrets.OHSHEET_ANTHROPIC_API_KEY }}
        run: |
          # Set up SSH
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VM_HOST" >> ~/.ssh/known_hosts

          SSH="ssh -i ~/.ssh/deploy_key ${VM_USER}@${VM_HOST}"
          SCP="scp -i ~/.ssh/deploy_key"

          # Write .env with image tags, commit SHA, and domain for docker compose
          echo "IMAGE=${{ env.IMAGE }}:${{ github.sha }}" > /tmp/.env
          echo "IMAGE_DECOMPOSER=${{ env.IMAGE_DECOMPOSER }}:${{ github.sha }}" >> /tmp/.env
          echo "IMAGE_ASSEMBLER=${{ env.IMAGE_ASSEMBLER }}:${{ github.sha }}" >> /tmp/.env
          echo "COMMIT_SHA=${{ github.sha }}" >> /tmp/.env
          echo "DOMAIN=${{ vars.DOMAIN }}" >> /tmp/.env
          # TuneChat — values come from the step env: above (safe shell
          # expansion of pre-declared env vars, not inline expressions).
          echo "OHSHEET_TUNECHAT_ENABLED=${OHSHEET_TUNECHAT_ENABLED}" >> /tmp/.env
          echo "OHSHEET_TUNECHAT_URL=${OHSHEET_TUNECHAT_URL}" >> /tmp/.env
          echo "OHSHEET_TUNECHAT_API_KEY=${OHSHEET_TUNECHAT_API_KEY}" >> /tmp/.env
          # Anthropic — worker-refine LLM metadata enrichment.
          echo "OHSHEET_ANTHROPIC_API_KEY=${OHSHEET_ANTHROPIC_API_KEY}" >> /tmp/.env

          # Copy compose files to VM (SCP .env to temp name, then atomic mv)
          $SCP docker-compose.prod.yml Caddyfile "${VM_USER}@${VM_HOST}:~/oh-sheet/"
          $SCP /tmp/.env "${VM_USER}@${VM_HOST}:~/oh-sheet/.env.tmp"
          $SSH "mv ~/oh-sheet/.env.tmp ~/oh-sheet/.env && mv ~/oh-sheet/docker-compose.prod.yml ~/oh-sheet/docker-compose.yml"

          # Aggressively reclaim VM disk BEFORE pulling new images.
          # The app image ships heavy ML deps (torch via [pop2piano])
          # with a single layer exceeding 1.6 GB. `docker system prune
          # -af` removes all unused images, build cache, and stopped
          # containers — images backing running containers are safe.
          # After pull + restart the old images become unused and the
          # post-pull prune catches them immediately.
          $SSH "cd ~/oh-sheet && \
                sudo docker system prune -af && \
                sudo docker compose pull && \
                sudo docker compose up -d --remove-orphans && \
                sudo docker system prune -af"

      - name: Verify deployment
        env:
          PUBLIC_URL: ${{ vars.PUBLIC_URL }}
        run: |
          sleep 15
          curl -sf --retry 5 --retry-delay 5 "${PUBLIC_URL}/v1/health" && echo "Health check passed" || echo "::warning::Health check did not pass yet"

      - name: Notify Slack on success
        if: success()
        run: |
          COMMIT_SHORT="${{ github.sha }}"
          COMMIT_SHORT="${COMMIT_SHORT:0:7}"
          ENV_NAME="${{ github.ref_name == 'main' && 'PROD' || 'QA' }}"
          curl -sf -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-type: application/json' \
            -d "{
              \"text\": \":white_check_mark: *oh-sheet [${ENV_NAME}] deployed* v${{ steps.version.outputs.version }} (\`${COMMIT_SHORT}\`) to <${{ vars.PUBLIC_URL }}> — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>\"
            }"

      - name: Notify Slack on failure
        if: failure()
        run: |
          COMMIT_SHORT="${{ github.sha }}"
          COMMIT_SHORT="${COMMIT_SHORT:0:7}"
          ENV_NAME="${{ github.ref_name == 'main' && 'PROD' || 'QA' }}"
          curl -sf -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-type: application/json' \
            -d "{
              \"text\": \":x: *oh-sheet [${ENV_NAME}] deploy failed* \`${COMMIT_SHORT}\` — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>\"
            }"
