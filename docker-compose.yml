services:
  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      OHSHEET_BLOB_ROOT: /app/blob
      OHSHEET_REDIS_URL: redis://redis:6379/0
    volumes:
      - ./blob:/app/blob
      - ./backend:/app/backend
    depends_on:
      redis:
        condition: service_healthy

  worker-ingest:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: celery -A backend.workers.celery_app worker -Q ingest -c 1 --loglevel=info
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      OHSHEET_BLOB_ROOT: /app/blob
      OHSHEET_REDIS_URL: redis://redis:6379/0
    volumes:
      - ./blob:/app/blob
      - ./backend:/app/backend
    depends_on:
      redis:
        condition: service_healthy

  worker-transcribe:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: celery -A backend.workers.celery_app worker -Q transcribe -c 1 --loglevel=info
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      OHSHEET_BLOB_ROOT: /app/blob
      OHSHEET_REDIS_URL: redis://redis:6379/0
    volumes:
      - ./blob:/app/blob
      - ./backend:/app/backend
    depends_on:
      redis:
        condition: service_healthy

  worker-arrange:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: celery -A backend.workers.celery_app worker -Q arrange -c 1 --loglevel=info
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      OHSHEET_BLOB_ROOT: /app/blob
      OHSHEET_REDIS_URL: redis://redis:6379/0
    volumes:
      - ./blob:/app/blob
      - ./backend:/app/backend
    depends_on:
      redis:
        condition: service_healthy

  worker-humanize:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: celery -A backend.workers.celery_app worker -Q humanize -c 1 --loglevel=info
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      OHSHEET_BLOB_ROOT: /app/blob
      OHSHEET_REDIS_URL: redis://redis:6379/0
    volumes:
      - ./blob:/app/blob
      - ./backend:/app/backend
    depends_on:
      redis:
        condition: service_healthy

  worker-engrave:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: celery -A backend.workers.celery_app worker -Q engrave -c 1 --loglevel=info
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
