services:
  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  orchestrator:
    # essentia (Pop2Piano dep) only ships x86_64 Linux wheels.
    # On Apple Silicon this runs under Rosetta — transparent but ~10-20% slower.
    platform: linux/amd64
    image: ${BASE_IMAGE:-ghcr.io/oh-sheet-team/ohsheet-dev-base:latest}
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      OHSHEET_BLOB_ROOT: /app/blob
      OHSHEET_REDIS_URL: redis://redis:6379/0
    volumes:
      - ./blob:/app/blob
      - ./backend:/app/backend
      - ./shared:/app/shared
    depends_on:
      redis:
        condition: service_healthy

  worker-ingest:
    platform: linux/amd64
    image: ${BASE_IMAGE:-ghcr.io/oh-sheet-team/ohsheet-dev-base:latest}
    command: celery -A backend.workers.celery_app worker -Q ingest -c 1 --loglevel=info
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      OHSHEET_BLOB_ROOT: /app/blob
      OHSHEET_REDIS_URL: redis://redis:6379/0
    volumes:
      - ./blob:/app/blob
      - ./backend:/app/backend
      - ./shared:/app/shared
    depends_on:
      redis:
        condition: service_healthy

  worker-transcribe:
    platform: linux/amd64
    image: ${BASE_IMAGE:-ghcr.io/oh-sheet-team/ohsheet-dev-base:latest}
    command: celery -A backend.workers.celery_app worker -Q transcribe -c 1 --loglevel=info
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      OHSHEET_BLOB_ROOT: /app/blob
