      OHSHEET_BLOB_ROOT: /app/blob
      OHSHEET_REDIS_URL: redis://redis:6379/0
    volumes:
      - ./blob:/app/blob
      - ./backend:/app/backend
      - ./shared:/app/shared
    depends_on:
      redis:
        condition: service_healthy

  worker-humanize:
