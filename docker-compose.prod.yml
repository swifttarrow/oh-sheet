services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  orchestrator:
    build: .
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --workers 2
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      OHSHEET_BLOB_ROOT: /app/blob
      OHSHEET_REDIS_URL: redis://redis:6379/0
    volumes:
      - blob-data:/app/blob
    depends_on:
      redis:
        condition: service_healthy

  worker-ingest:
    build: .
    command: celery -A backend.workers.celery_app worker -Q ingest -c 1 --loglevel=warning
    restart: unless-stopped
    environment:
      OHSHEET_BLOB_ROOT: /app/blob
      OHSHEET_REDIS_URL: redis://redis:6379/0
    volumes:
      - blob-data:/app/blob
    depends_on:
      redis:
        condition: service_healthy

  worker-decomposer:
    build:
      context: .
      dockerfile: svc-decomposer/Dockerfile
    restart: unless-stopped
    environment:
      OHSHEET_BLOB_ROOT: /app/blob
      OHSHEET_REDIS_URL: redis://redis:6379/0
    volumes:
      - blob-data:/app/blob
    depends_on:
      redis:
        condition: service_healthy

  worker-assembler:
    build:
      context: .
      dockerfile: svc-assembler/Dockerfile
    restart: unless-stopped
    environment:
      OHSHEET_BLOB_ROOT: /app/blob
      OHSHEET_REDIS_URL: redis://redis:6379/0
    volumes:
      - blob-data:/app/blob
    depends_on:
      redis:
        condition: service_healthy

  worker-humanize:
    build: .
    command: celery -A backend.workers.celery_app worker -Q humanize -c 1 --loglevel=warning
    restart: unless-stopped
    environment:
      OHSHEET_BLOB_ROOT: /app/blob
      OHSHEET_REDIS_URL: redis://redis:6379/0
    volumes:
      - blob-data:/app/blob
    depends_on:
      redis:
        condition: service_healthy

  worker-engrave:
    build: .
    command: celery -A backend.workers.celery_app worker -Q engrave -c 1 --loglevel=warning
    restart: unless-stopped
    environment:
      OHSHEET_BLOB_ROOT: /app/blob
      OHSHEET_REDIS_URL: redis://redis:6379/0
    volumes:
      - blob-data:/app/blob
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis-data:
  blob-data:
