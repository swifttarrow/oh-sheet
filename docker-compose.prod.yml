services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # No `ports:` — Redis is only reachable by other services on the
    # internal Docker network, never exposed to the host.
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  orchestrator:
    # JobManager stores jobs in an in-process dict (see
    # backend/jobs/manager.py — "Single-process v1"), so running more
    # than one uvicorn worker splits job state across processes: POST
    # /v1/jobs lands on one worker, the subsequent GET / WS lands on
    # another and returns "Job not found" (GAU-100). Keep --workers 1
    # until JobManager is backed by Redis / Postgres.
    image: ${IMAGE}
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --workers 1
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      OHSHEET_BLOB_ROOT: /app/blob
      OHSHEET_REDIS_URL: redis://redis:6379/0
      # Pin the score pipeline explicitly so a default flip in
      # backend/config.py can't silently change prod behavior. Only the
      # orchestrator reads this (PipelineConfig is built at job-creation
      # time in api/routes/jobs.py); workers just execute whatever stage
      # they're dispatched. Remove after validating condense_only in prod.
      OHSHEET_SCORE_PIPELINE: arrange
      # TuneChat external transcription. The ingest stage POSTs audio to
      # TuneChat in parallel with Oh Sheet's own pipeline. Orchestrator
      # needs these because api/routes/jobs.py reads settings.tunechat_*
      # when building PipelineConfig at job-creation time. Enabled flag
      # is the kill switch — unset or set to "false" to short-circuit.
      OHSHEET_TUNECHAT_ENABLED: ${OHSHEET_TUNECHAT_ENABLED:-false}
      OHSHEET_TUNECHAT_URL: ${OHSHEET_TUNECHAT_URL:-}
      OHSHEET_TUNECHAT_API_KEY: ${OHSHEET_TUNECHAT_API_KEY:-}
      COMMIT_SHA: ${COMMIT_SHA:-unknown}
    volumes:
      - blob-data:/app/blob
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  worker-ingest:
    image: ${IMAGE}
    command: celery -A backend.workers.celery_app worker -Q ingest -c 1 --loglevel=warning
    restart: unless-stopped
    environment:
      OHSHEET_BLOB_ROOT: /app/blob
      OHSHEET_REDIS_URL: redis://redis:6379/0
      # TuneChat is called from services/ingest.py via the tunechat_client
      # (async httpx.AsyncClient.post) — see config comment on
      # tunechat_timeout_sec. Worker must have the env vars or the call
      # short-circuits to None and Oh Sheet uses its own pipeline only.
      OHSHEET_TUNECHAT_ENABLED: ${OHSHEET_TUNECHAT_ENABLED:-false}
      OHSHEET_TUNECHAT_URL: ${OHSHEET_TUNECHAT_URL:-}
      OHSHEET_TUNECHAT_API_KEY: ${OHSHEET_TUNECHAT_API_KEY:-}
    volumes:
      - blob-data:/app/blob
    depends_on:
      redis:
        condition: service_healthy

  worker-transcribe:
    image: ${IMAGE}
    command: celery -A backend.workers.celery_app worker -Q transcribe -c 1 --loglevel=warning
    restart: unless-stopped
    environment:
      OHSHEET_BLOB_ROOT: /app/blob
      OHSHEET_REDIS_URL: redis://redis:6379/0
    volumes:
      - blob-data:/app/blob
    depends_on:
      redis:
        condition: service_healthy

  worker-arrange:
    image: ${IMAGE}
    command: celery -A backend.workers.celery_app worker -Q arrange -c 1 --loglevel=warning
    restart: unless-stopped
    environment:
      OHSHEET_BLOB_ROOT: /app/blob
      OHSHEET_REDIS_URL: redis://redis:6379/0
    volumes:
      - blob-data:/app/blob
    depends_on:
      redis:
        condition: service_healthy

  worker-decomposer:
    image: ${IMAGE_DECOMPOSER}
    restart: unless-stopped
    environment:
      OHSHEET_BLOB_ROOT: /app/blob
      OHSHEET_REDIS_URL: redis://redis:6379/0
    volumes:
      - blob-data:/app/blob
    depends_on:
      redis:
        condition: service_healthy

  worker-assembler:
    image: ${IMAGE_ASSEMBLER}
    restart: unless-stopped
    environment:
      OHSHEET_BLOB_ROOT: /app/blob
      OHSHEET_REDIS_URL: redis://redis:6379/0
    volumes:
      - blob-data:/app/blob
    depends_on:
      redis:
        condition: service_healthy

  worker-humanize:
    image: ${IMAGE}
    command: celery -A backend.workers.celery_app worker -Q humanize -c 1 --loglevel=warning
    restart: unless-stopped
    environment:
      OHSHEET_BLOB_ROOT: /app/blob
      OHSHEET_REDIS_URL: redis://redis:6379/0
    volumes:
      - blob-data:/app/blob
    depends_on:
      redis:
        condition: service_healthy

  worker-refine:
    image: ${IMAGE}
    command: celery -A backend.workers.celery_app worker -Q refine -c 1 --loglevel=warning
    restart: unless-stopped
    environment:
      OHSHEET_BLOB_ROOT: /app/blob
      OHSHEET_REDIS_URL: redis://redis:6379/0
      OHSHEET_ANTHROPIC_API_KEY: ${OHSHEET_ANTHROPIC_API_KEY:-}
    volumes:
      - blob-data:/app/blob
    depends_on:
      redis:
        condition: service_healthy

  worker-engrave:
    image: ${IMAGE}
    command: celery -A backend.workers.celery_app worker -Q engrave -c 1 --loglevel=warning
    restart: unless-stopped
    environment:
      OHSHEET_BLOB_ROOT: /app/blob
      OHSHEET_REDIS_URL: redis://redis:6379/0
    volumes:
      - blob-data:/app/blob
    depends_on:
      redis:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      orchestrator:
        condition: service_healthy

volumes:
  redis-data:
  blob-data:
  caddy-data:
  caddy-config:
